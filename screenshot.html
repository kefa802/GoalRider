<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goal Rider Biz - スクショ管理</title>
    <meta name="theme-color" content="#2c3e50">
    <style>
        html, body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; color: #333; height: auto; min-height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .header { background: #2c3e50; padding: 15px; color: white; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .back-btn { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        
        .info-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; text-align: center; }
        
        .date-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .nav-btn { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 6px; padding: 10px 15px; cursor: pointer; font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .nav-btn:active { background: #bdc3c7; }
        .date-input { font-size: 1.2em; font-weight: bold; color: #2980b9; padding: 8px 5px; border: 1px solid #ccc; border-radius: 6px; text-align: center; width: 160px; box-sizing: border-box; }
        
        .rider-display { font-size: 0.9em; color: #7f8c8d; margin-top: 5px; }

        .upload-area { background: white; border-radius: 8px; padding: 20px; text-align: center; border: 2px dashed #ccc; margin-bottom: 15px; }
        
        .map-btn { background: #27ae60; color: white; border: none; padding: 15px 20px; font-size: 1.1em; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .upload-btn { background: #3498db; color: white; border: none; padding: 15px 20px; font-size: 1.1em; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .gallery { display: flex; flex-direction: column; gap: 20px; }
        .gallery-item { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .gallery-item img { width: 100%; height: auto; border-radius: 6px; display: block; margin-bottom: 10px; cursor: pointer; }
        .delete-btn { width: 100%; background: #e74c3c; color: white; border: none; padding: 12px; font-size: 1em; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .loading { display: none; text-align: center; padding: 20px; color: #7f8c8d; font-weight: bold; }
        .empty-msg { text-align: center; color: #999; padding: 20px; font-size: 0.9em; background: white; border-radius: 8px; border: 1px dashed #ccc; }

        /* フルスクリーンズームビューワー */
        #imageViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 9999; overflow: auto; align-items: center; justify-content: center; }
        .viewer-close { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.3); color: white; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div id="imageViewer">
        <div class="viewer-close" onclick="closeImageViewer()">✕</div>
        <img id="viewerImg" src="" style="max-width: 100%; height: auto; margin: auto; display: block;">
    </div>

    <div id="appUI">
        <div class="header">
            <button class="back-btn" onclick="goBack()">◀ 戻る</button>
            <div style="font-weight: bold;">スクショ管理 V1.12</div>
            <div style="width: 60px;"></div>
        </div>

        <div class="container">
            <div class="info-card">
                <div class="date-container">
                    <button class="nav-btn" onclick="changeDay(-1)">◀</button>
                    <input type="date" id="dateSelector" class="date-input" onchange="changeDate()">
                    <button class="nav-btn" onclick="changeDay(1)">▶</button>
                </div>
                <div class="rider-display" id="displayRider">----</div>
            </div>

            <div class="upload-area">
                <p style="color: #666; font-size: 0.85em; margin-top: 0; margin-bottom: 15px;">Googleマップのタイムラインを撮影し<br>下のボタンから追加してください。</p>
                
                <button class="map-btn" onclick="openTimeline()">📍 マップのタイムラインを開く</button>

                <input type="file" id="fileInput" accept="image/*" multiple style="display: none;" onchange="handleFileSelect(event)">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 スクショを追加する</button>
            </div>

            <div id="loadingMsg" class="loading">⏳ 処理中...</div>

            <div id="imageGallery" class="gallery"></div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://goalrider-81f01-default-rtdb.firebaseio.com/screenshots";
        const RIDERS = ["工藤正臣", "高瀬戒兜"];
        
        let targetDate = "";
        let riderName = "";

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            targetDate = params.get('date') || new Date().toISOString().split('T')[0];
            const riderIdx = params.get('rider') || 0;
            riderName = RIDERS[riderIdx];

            document.getElementById('dateSelector').value = targetDate;
            document.getElementById('displayRider').innerText = riderName;

            loadExistingImages();
        };

        function openImageViewer(src) {
            document.getElementById('appUI').style.display = 'none';
            document.getElementById('viewerImg').src = src;
            document.getElementById('imageViewer').style.display = 'flex';
            document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }

        function closeImageViewer() {
            document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
            document.getElementById('imageViewer').style.display = 'none';
            document.getElementById('appUI').style.display = 'block';
            window.scrollTo(0, 0); 
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function openTimeline() {
            const d = new Date(targetDate);
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const day = d.getDate();
            const url = `https://www.google.com/maps/timeline?pb=!1m2!1m1!1s${y}-${m}-${day}`;
            window.open(url, '_blank');
        }

        function changeDay(offset) {
            const dateInput = document.getElementById('dateSelector');
            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + offset);
            
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            
            dateInput.value = `${y}-${m}-${d}`;
            changeDate();
        }

        function changeDate() {
            targetDate = document.getElementById('dateSelector').value;
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('date', targetDate);
            window.history.replaceState({}, '', newUrl);
            
            loadExistingImages();
        }

        function showLoading(show) {
            document.getElementById('loadingMsg').style.display = show ? 'block' : 'none';
        }

        async function loadExistingImages() {
            showLoading(true);
            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = ''; 

            try {
                const url = `${DB_BASE}/${riderName}/${targetDate}.json`;
                const res = await fetch(url);
                const data = await res.json();

                if (data) {
                    let hasImages = false;
                    if (data.base64) {
                        renderImage("old_format", data.base64);
                        hasImages = true;
                    } else {
                        Object.keys(data).forEach(key => {
                            if (data[key] && data[key].base64) {
                                renderImage(key, data[key].base64);
                                hasImages = true;
                            }
                        });
                    }

                    if (!hasImages) {
                        gallery.innerHTML = '<div class="empty-msg">保存されたスクショはありません</div>';
                    }
                } else {
                    gallery.innerHTML = '<div class="empty-msg">保存されたスクショはありません</div>';
                }
            } catch (e) {
                gallery.innerHTML = '<div class="empty-msg" style="color:#e74c3c;">読み込みエラーが発生しました</div>';
            }
            showLoading(false);
        }

        function renderImage(key, base64Src) {
            const gallery = document.getElementById('imageGallery');
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'gallery-item';
            itemDiv.id = `img-${key}`;
            
            itemDiv.innerHTML = `
                <img src="${base64Src}" alt="Screenshot" onclick="openImageViewer(this.src)">
                <p style="font-size: 0.65em; text-align: center; color: #888; margin-top: -5px; margin-bottom: 8px;">タップで全画面表示（ズーム可能）</p>
                <button class="delete-btn" onclick="deleteImage('${key}')">🗑️ この画像を削除</button>
            `;
            gallery.appendChild(itemDiv);
        }

        async function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            showLoading(true);
            
            for (let i = 0; i < files.length; i++) {
                await processAndUpload(files[i]);
            }
            
            document.getElementById('fileInput').value = "";
            loadExistingImages();
        }

        function processAndUpload(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = async function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;
                        const max_size = 800;

                        if (w > h && w > max_size) {
                            h *= max_size / w;
                            w = max_size;
                        } else if (h > max_size) {
                            w *= max_size / h;
                            h = max_size;
                        }

                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        const base64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        const uniqueId = `img_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
                        const url = `${DB_BASE}/${riderName}/${targetDate}/${uniqueId}.json`;
                        
                        const payload = {
                            base64: base64,
                            timestamp: new Date().toISOString()
                        };

                        try {
                            await fetch(url, { method: 'PUT', body: JSON.stringify(payload) });
                        } catch(err) {
                            console.error("アップロード失敗", err);
                        }
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function deleteImage(key) {
            if (!confirm("本当にこの画像を削除しますか？")) return;

            showLoading(true);
            try {
                let url;
                if (key === "old_format") {
                    url = `${DB_BASE}/${riderName}/${targetDate}.json`;
                } else {
                    url = `${DB_BASE}/${riderName}/${targetDate}/${key}.json`;
                }
                
                const res = await fetch(url, { method: 'DELETE' });

                if (res.ok) {
                    loadExistingImages();
                } else {
                    throw new Error("削除失敗");
                }
            } catch (e) {
                alert("削除に失敗しました。");
                showLoading(false);
            }
        }
    </script>
</body>
</html>
