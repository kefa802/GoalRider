<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goal Rider</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .goal-info h2 { margin: 0; font-size: 1.1em; color: #666; }
        .remaining { color: #e74c3c; font-weight: bold; font-size: 1.4em; margin-top: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-row { display: flex; gap: 8px; }
        
        button { 
            flex: 1; padding: 12px; border-radius: 8px; 
            border: 2px solid #ddd; background: white; 
            cursor: pointer; font-weight: bold; color: #333;
        }

        /* 選択中のボタン：青く強調 */
        .active-view { 
            background: #e3f2fd !important; 
            border-color: #3498db !important; 
            color: #1e88e5 !important; 
        }

        .btn-nav { flex: 0.5; background: #eee; border: 1px solid #ccc; padding: 8px; }
        .btn-primary { background: #2ecc71; color: white; border: none; width: 100%; font-size: 1.1em; margin-top: 10px; padding: 15px; }
        
        #inputModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 85%; border-radius: 15px; box-sizing: border-box; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 0.9em; color: #555; }
        .input-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1.1em; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 id="viewTitle">目標: <span id="displayGoal">0</span>円</h2>
            <button onclick="setGoal()" style="flex:none; padding: 5px 10px; font-size: 0.8em; border: 1px solid #ccc;">設定</button>
        </div>
        <div style="font-size: 0.9em;">期間合計: <span id="displayCurrent">0</span>円</div>
        <div class="remaining">残り: <span id="displayRemaining">0</span>円</div>
    </div>

    <div class="control-group">
        <div class="btn-row">
            <button id="btnWeek" onclick="switchView('week')
