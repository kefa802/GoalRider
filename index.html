<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goal Rider</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .remaining { color: #e74c3c; font-weight: bold; font-size: 1.4em; margin-top: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-row { display: flex; gap: 8px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .active-view { background: #e3f2fd !important; border-color: #3498db !important; color: #1e88e5 !important; }
        .btn-primary { background: #2ecc71; color: white; border: none; width: 100%; font-size: 1.1em; margin-top: 10px; padding: 15px; }
        #inputModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 85%; border-radius: 15px; box-sizing: border-box; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 0.9em; }
        .input-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; font-size:1.1em; color:#666;">目標: <span id="displayGoal">0</span>円</h2>
            <button onclick="setGoal()" style="flex:none; padding: 5px 10px; font-size: 0.8em;">設定</button>
        </div>
        <div style="margin-top:10px;">期間合計: <span id="displayCurrent">0</span>円</div>
        <div class="remaining">残り: <span id="displayRemaining">0</span>円</div>
    </div>

    <div class="control-group">
        <div class="btn-row">
            <button id="btnWeek" onclick="switchView('week')">週次</button>
            <button id="btnMonth" onclick="switchView('month')" class="active-view">月次</button>
        </div>
        <div class="btn-row">
            <button onclick="navigateTime(-1)" style="flex:0.4;">◀ 前</button>
            <span id="periodLabel" style="flex:1; text-align:center; align-self:center; font-weight:bold;"></span>
            <button onclick="navigateTime(1)" style="flex:0.4;">次 ▶</button>
        </div>
    </div>

    <div class="card">
        <div style="height: 220px; position: relative;">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <button class="btn-primary" onclick="openModal()">売上を入力・修正する</button>

    <div id="inputModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">売上入力</h3>
            <div class="input-group"><label>日付</label><input type="date" id="inputDate" onchange="loadExistingData()"></div>
            <div class="input-group"><label>Uber</label><input type="number" id="inputUber" inputmode="numeric"></div>
            <div class="input-group"><label>出前館</label><input type="number" id="inputDemae" inputmode="numeric"></div>
            <div class="input-group"><label>Menu</label><input type="number" id="inputMenu" inputmode="numeric"></div>
            <div class="input-group"><label>ロケットナウ</label><input type="number" id="inputRocket" inputmode="numeric"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()">戻る</button>
                <button class="btn-primary" style="margin-top:0;" onclick="saveSales()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 基本変数の宣言
        let goal = Number(localStorage.getItem('goalRiderGoal')) || 500000;
        let salesData = JSON.parse(localStorage.getItem('goalRiderSalesObj')) || {};
        let currentView = 'month';
        let referenceDate = new Date();
        let myChart = null;

        // 2. ページ読み込み完了時に実行
        window.addEventListener('load', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            renderApp();
        });

        function switchView(view) {
            currentView = view;
            document.getElementById('btnWeek').className = (view === 'week' ? 'active-view' : '');
            document.getElementById('btnMonth').className = (view === 'month' ? 'active-view' : '');
            renderApp();
        }

        function navigateTime(direction) {
            if (currentView === 'month') {
                referenceDate.setMonth(referenceDate.getMonth() + direction);
            } else {
                referenceDate.setDate(referenceDate.getDate() + (direction * 7));
            }
            renderApp();
        }

        function setGoal() {
            const val = prompt("目標金額を入力してください", goal);
            if (val) {
                goal = Number(val);
                localStorage.setItem('goalRiderGoal', goal);
                renderApp();
            }
        }

        function openModal() { document.getElementById('inputModal').style.display = 'block'; loadExistingData(); }
        function closeModal() { document.getElementById('inputModal').style.display = 'none'; }

        function loadExistingData() {
            const dateKey = document.getElementById('inputDate').value;
            const data = salesData[dateKey] || { uber:0, demae:0, menu:0, rocket:0 };
            document.getElementById('inputUber').value = data.uber || "";
            document.getElementById('inputDemae').value = data.demae || "";
            document.getElementById('inputMenu').value = data.menu || "";
            document.getElementById('inputRocket').value = data.rocket || "";
        }

        function saveSales() {
            const dateKey = document.getElementById('inputDate').value;
            salesData[dateKey] = {
                uber: Number(document.getElementById('inputUber').value) || 0,
                demae: Number(document.getElementById('inputDemae').value) || 0,
                menu: Number(document.getElementById('inputMenu').value) || 0,
                rocket: Number(document.getElementById('inputRocket').value) || 0
            };
            localStorage.setItem('goalRiderSalesObj', JSON.stringify(salesData));
            closeModal();
            renderApp();
        }

        function renderApp() {
            let labels = [];
            let chartValues = [];
            let total = 0;

            if (currentView === 'month') {
                const year = referenceDate.getFullYear();
                const month = referenceDate.getMonth();
                const lastDay = new Date(year, month + 1, 0).getDate();
                document.getElementById('periodLabel').innerText = `${year}年${month + 1}月`;
                for (let d = 1; d <= lastDay; d++) {
                    const key = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    labels.push(d);
                    const val = (salesData[key]?.uber || 0) + (salesData[key]?.demae || 0) + (salesData[key]?.menu || 0) + (salesData[key]?.rocket || 0);
                    chartValues.push(val);
                    total += val;
                }
            } else {
                const dayOfWeek = referenceDate.getDay() || 7;
                const monday = new Date(referenceDate);
                monday.setDate(referenceDate.getDate() - dayOfWeek + 1);
                document.getElementById('periodLabel').innerText = `${monday.getMonth()+1}/${monday.getDate()}〜`;
                for (let i = 0; i < 7; i++) {
                    const d = new Date(monday); d.setDate(monday.getDate() + i);
                    const key = d.toISOString().split('T')[0];
                    labels.push(['月','火','水','木','金','土','日'][i]);
                    const val = (salesData[key]?.uber || 0) + (salesData[key]?.demae || 0) + (salesData[key]?.menu || 0) + (salesData[key]?.rocket || 0);
                    chartValues.push(val);
                    total += val;
                }
            }

            document.getElementById('displayGoal').innerText = goal.toLocaleString();
            document.getElementById('displayCurrent').innerText = total.toLocaleString();
            document.getElementById('displayRemaining').innerText = Math.max(0, goal - total).toLocaleString();

            // グラフライブラリが読み込まれている場合のみ描画
            if (typeof Chart !== 'undefined') {
                const ctx = document.getElementById('salesChart').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: '売上', data: chartValues, backgroundColor: '#3498db' }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                });
            }
        }
    </script>
</body>
</html>
