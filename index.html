<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Rider</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .goal-info h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #666; }
        .remaining { color: #e74c3c; font-weight: bold; font-size: 1.4em; margin-top: 5px; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #2ecc71; color: white; border: none; width: 100%; font-size: 1em; }
        
        /* 入力用モーダル */
        #inputModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 85%; border-radius: 12px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 90%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; }
    </style>
</head>
<body>

    <div class="card">
        <div class="goal-info">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>目標: <span id="displayGoal">500,000</span>円</h2>
                <button onclick="setGoal()" style="flex:none; padding: 5px 15px;">設定</button>
            </div>
            <div>現在: <span id="displayCurrent">0</span>円</div>
            <div class="remaining">残り: <span id="displayRemaining">500,000</span>円</div>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="updateChart('day')">日</button>
        <button onclick="updateChart('week')">週次</button>
        <button onclick="updateChart('month')">月次</button>
    </div>

    <div class="card">
        <canvas id="salesChart"></canvas>
    </div>

    <button class="btn-primary" onclick="openModal()">売上を入力する</button>

    <div id="inputModal">
        <div class="modal-content">
            <h3>売上入力</h3>
            <div class="input-group"><label>Uber</label><input type="number" id="inputUber" placeholder="0"></div>
            <div class="input-group"><label>出前館</label><input type="number" id="inputDemae" placeholder="0"></div>
            <div class="input-group"><label>Menu</label><input type="number" id="inputMenu" placeholder="0"></div>
            <div class="input-group"><label>Wolt</label><input type="number" id="inputWolt" placeholder="0"></div>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal()">キャンセル</button>
                <button class="btn-primary" onclick="saveSales()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let goal = 500000;
        let salesData = JSON.parse(localStorage.getItem('goalRiderSales')) || [];

        function openModal() { document.getElementById('inputModal').style.display = 'block'; }
        function closeModal() { document.getElementById('inputModal').style.display = 'none'; }

        function saveSales() {
            const data = {
                date: new Date().toLocaleDateString(),
                uber: Number(document.getElementById('inputUber').value) || 0,
                demae: Number(document.getElementById('inputDemae').value) || 0,
                menu: Number(document.getElementById('inputMenu').value) || 0,
                wolt: Number(document.getElementById('inputWolt').value) || 0
            };
            salesData.push(data);
            localStorage.setItem('goalRiderSales', JSON.stringify(salesData));
            alert('保存しました！');
            closeModal();
            location.reload(); // 画面を更新して反映
        }

        // データの計算と表示
        const currentSales = salesData.reduce((sum, d) => sum + d.uber + d.demae + d.menu + d.wolt, 0);
        document.getElementById('displayCurrent').innerText = currentSales.toLocaleString();
        document.getElementById('displayRemaining').innerText = (goal - currentSales).toLocaleString();

        // グラフ描画
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: salesData.map(d => d.date),
                datasets: [{
                    label: '合計売上',
                    data: salesData.map(d => d.uber + d.demae + d.menu + d.wolt),
                    backgroundColor: '#3498db'
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    </script>
</body>
</html>
