<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Rider</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .goal-info { color: #333; }
        .remaining { color: #e74c3c; font-weight: bold; font-size: 1.2em; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .btn-primary { background: #2ecc71; color: white; border: none; }
        canvas { background: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="goal-info">
            <div style="display: flex; justify-content: space-between;">
                <span>目標: 500,000円</span>
                <button onclick="alert('設定画面へ')" style="flex:none; padding: 2px 10px;">設定</button>
            </div>
            <div style="margin: 10px 0;">現在: 200,000円</div>
            <div class="remaining">残り: 300,000円</div>
        </div>
    </div>

    <div class="btn-group">
        <button>日</button>
        <button>週次</button>
        <button>月次</button>
    </div>

    <div class="card">
        <canvas id="salesChart"></canvas>
    </div>

    <button class="btn-primary" onclick="showInput()">売上を入力する</button>

    <script>
        // 簡易グラフの描画
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['1', '2', '3', '4', '5', '6', '7'],
                datasets: [{
                    label: '売上',
                    data: [12000, 15000, 8000, 17000, 11000, 9000, 14000],
                    backgroundColor: '#3498db'
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });

        function showInput() {
            alert("ここにUber、出前館、Menu、Woltの入力フォームを表示します");
        }
    </script>
</body>
</html>
