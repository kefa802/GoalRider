<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Rider</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .goal-info h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #666; }
        .remaining { color: #e74c3c; font-weight: bold; font-size: 1.4em; margin-top: 5px; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #2ecc71; color: white; border: none; width: 100%; font-size: 1.1em; margin-top: 10px; }
        
        #inputModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 85%; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 0.9em; color: #555; }
        .input-group input { width: 94%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1.1em; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="goal-info">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><span id="currentMonthDisplay"></span> 目標: <span id="displayGoal">500,000</span>円</h2>
                <button onclick="setGoal()" style="flex:none; padding: 5px 10px; font-size: 0.8em;">設定</button>
            </div>
            <div>現在: <span id="displayCurrent">0</span>円</div>
            <div class="remaining">残り: <span id="displayRemaining">500,000</span>円</div>
        </div>
    </div>

    <div class="card">
        <canvas id="salesChart" height="200"></canvas>
    </div>

    <button class="btn-primary" onclick="openModal()">売上を入力・修正する</button>

    <div id="inputModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">売上入力</h3>
            <div class="input-group">
                <label>日付を選択</label>
                <input type="date" id="inputDate">
            </div>
            <hr>
            <div class="input-group"><label>Uber</label><input type="number" id="inputUber" inputmode="numeric" placeholder="0"></div>
            <div class="input-group"><label>出前館</label><input type="number" id="inputDemae" inputmode="numeric" placeholder="0"></div>
